<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 540" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#bbf7d0"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8"/>
      <feOffset dx="0" dy="6" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background blob -->
  <circle cx="450" cy="120" r="180" fill="url(#bgGrad)" opacity="0.7"/>
  <circle cx="120" cy="420" r="140" fill="#dbeafe" opacity="0.5"/>

  <!-- Decorative dots -->
  <circle cx="80" cy="80" r="4" fill="#16a34a" opacity="0.4"/>
  <circle cx="540" cy="280" r="6" fill="#22c55e" opacity="0.5"/>
  <circle cx="60" cy="280" r="5" fill="#3b82f6" opacity="0.4"/>
  <circle cx="520" cy="450" r="4" fill="#16a34a" opacity="0.4"/>

  <!-- Main job card (front) -->
  <g filter="url(#softShadow)" transform="translate(140, 130)">
    <rect width="320" height="200" rx="20" fill="url(#cardGrad)" stroke="#e2e8f0" stroke-width="1"/>
    <!-- Badge -->
    <rect x="24" y="24" width="64" height="22" rx="11" fill="#dcfce7"/>
    <text x="56" y="39" font-family="Pretendard, sans-serif" font-size="11" font-weight="700" fill="#16a34a" text-anchor="middle">정규직</text>
    <!-- D-day badge -->
    <rect x="240" y="24" width="56" height="22" rx="11" fill="#fef3c7"/>
    <text x="268" y="39" font-family="Pretendard, sans-serif" font-size="11" font-weight="700" fill="#b45309" text-anchor="middle">D-7</text>
    <!-- Title -->
    <text x="24" y="76" font-family="Pretendard, sans-serif" font-size="17" font-weight="700" fill="#0f172a">서울 강남구 요양보호사</text>
    <text x="24" y="100" font-family="Pretendard, sans-serif" font-size="13" font-weight="500" fill="#64748b">행복한노인요양원</text>
    <!-- Divider -->
    <line x1="24" y1="118" x2="296" y2="118" stroke="#f1f5f9" stroke-width="1"/>
    <!-- Wage -->
    <text x="24" y="146" font-family="Pretendard, sans-serif" font-size="13" font-weight="500" fill="#94a3b8">월급</text>
    <text x="24" y="170" font-family="Pretendard, sans-serif" font-size="20" font-weight="800" fill="#16a34a">2,650,000원~</text>
    <!-- Right hint -->
    <circle cx="270" cy="160" r="22" fill="#f0fdf4"/>
    <path d="M260 160 l8 8 l14 -16" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Mini card (top-right floating) -->
  <g filter="url(#softShadow)" transform="translate(380, 60)">
    <rect width="170" height="84" rx="14" fill="#ffffff"/>
    <circle cx="28" cy="42" r="20" fill="url(#accentGrad)"/>
    <path d="M22 42 l5 5 l9 -10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="60" y="38" font-family="Pretendard, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">전국 시설</text>
    <text x="60" y="58" font-family="Pretendard, sans-serif" font-size="18" font-weight="800" fill="#0f172a">31,281</text>
  </g>

  <!-- Mini card (bottom-left floating) -->
  <g filter="url(#softShadow)" transform="translate(40, 360)">
    <rect width="180" height="88" rx="14" fill="#ffffff"/>
    <circle cx="30" cy="44" r="22" fill="url(#blueGrad)"/>
    <text x="30" y="50" font-family="Pretendard, sans-serif" font-size="20" font-weight="800" fill="#fff" text-anchor="middle">Q</text>
    <text x="64" y="38" font-family="Pretendard, sans-serif" font-size="11" font-weight="600" fill="#94a3b8">기출문제</text>
    <text x="64" y="60" font-family="Pretendard, sans-serif" font-size="18" font-weight="800" fill="#0f172a">588문항</text>
  </g>

  <!-- Heart accent -->
  <g transform="translate(440, 360)" opacity="0.95">
    <circle cx="40" cy="40" r="40" fill="url(#accentGrad)" filter="url(#softShadow)"/>
    <path d="M40 56 c-12 -10 -22 -16 -22 -26 c0 -6 5 -10 10 -10 c4 0 8 2 12 8 c4 -6 8 -8 12 -8 c5 0 10 4 10 10 c0 10 -10 16 -22 26 z" fill="#fff"/>
  </g>

  <!-- Sparkles -->
  <g opacity="0.8">
    <path d="M510 180 l3 6 l6 3 l-6 3 l-3 6 l-3 -6 l-6 -3 l6 -3 z" fill="#fde047"/>
    <path d="M100 200 l2 4 l4 2 l-4 2 l-2 4 l-2 -4 l-4 -2 l4 -2 z" fill="#16a34a" opacity="0.6"/>
  </g>
</svg>
