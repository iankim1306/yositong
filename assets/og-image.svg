<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="50%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="og-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="og-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <circle cx="1050" cy="120" r="220" fill="#bbf7d0" opacity="0.5"/>
  <circle cx="120" cy="540" r="180" fill="#dbeafe" opacity="0.6"/>
  <circle cx="900" cy="540" r="100" fill="#dcfce7" opacity="0.5"/>

  <!-- Brand badge -->
  <g transform="translate(80, 90)">
    <rect width="180" height="44" rx="22" fill="#fff" filter="url(#og-shadow)"/>
    <circle cx="26" cy="22" r="10" fill="url(#og-accent)"/>
    <path d="M21 22 l4 4 l7 -8" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="48" y="29" font-family="Pretendard, sans-serif" font-size="16" font-weight="700" fill="#16a34a">yositong.com</text>
  </g>

  <!-- Main title -->
  <text x="80" y="240" font-family="Pretendard, sans-serif" font-size="72" font-weight="800" fill="#0f172a" letter-spacing="-2">요양보호사 일자리,</text>
  <text x="80" y="328" font-family="Pretendard, sans-serif" font-size="72" font-weight="800" fill="#16a34a" letter-spacing="-2">한눈에 다 보세요</text>

  <text x="80" y="396" font-family="Pretendard, sans-serif" font-size="26" font-weight="500" fill="#475569">전국 31,000개 요양시설 채용공고 · 기출문제 588 · 학원 가이드</text>

  <!-- Stats row -->
  <g transform="translate(80, 460)" filter="url(#og-shadow)">
    <rect width="220" height="100" rx="16" fill="#fff"/>
    <text x="24" y="44" font-family="Pretendard, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">채용공고</text>
    <text x="24" y="80" font-family="Pretendard, sans-serif" font-size="32" font-weight="800" fill="#16a34a">실시간 갱신</text>
  </g>
  <g transform="translate(320, 460)" filter="url(#og-shadow)">
    <rect width="220" height="100" rx="16" fill="#fff"/>
    <text x="24" y="44" font-family="Pretendard, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">전국 시설</text>
    <text x="24" y="80" font-family="Pretendard, sans-serif" font-size="32" font-weight="800" fill="#0f172a">31,281</text>
  </g>
  <g transform="translate(560, 460)" filter="url(#og-shadow)">
    <rect width="220" height="100" rx="16" fill="#fff"/>
    <text x="24" y="44" font-family="Pretendard, sans-serif" font-size="14" font-weight="600" fill="#94a3b8">기출문제</text>
    <text x="24" y="80" font-family="Pretendard, sans-serif" font-size="32" font-weight="800" fill="#0f172a">588문항</text>
  </g>

  <!-- Right floating card -->
  <g transform="translate(820, 130)" filter="url(#og-shadow)">
    <rect width="320" height="280" rx="24" fill="#fff"/>
    <rect x="28" y="28" width="80" height="28" rx="14" fill="#dcfce7"/>
    <text x="68" y="47" font-family="Pretendard, sans-serif" font-size="13" font-weight="700" fill="#16a34a" text-anchor="middle">정규직</text>
    <text x="28" y="100" font-family="Pretendard, sans-serif" font-size="22" font-weight="700" fill="#0f172a">서울 강남구</text>
    <text x="28" y="130" font-family="Pretendard, sans-serif" font-size="22" font-weight="700" fill="#0f172a">요양보호사 모집</text>
    <text x="28" y="166" font-family="Pretendard, sans-serif" font-size="14" fill="#64748b">행복한노인요양원</text>
    <line x1="28" y1="190" x2="292" y2="190" stroke="#f1f5f9" stroke-width="1"/>
    <text x="28" y="220" font-family="Pretendard, sans-serif" font-size="13" fill="#94a3b8">월급</text>
    <text x="28" y="252" font-family="Pretendard, sans-serif" font-size="26" font-weight="800" fill="#16a34a">2,650,000원~</text>
  </g>
</svg>
