<style>
:root {
  --ink: #1a1a1a;
  --ink-2: #4a4a4a;
  --ink-3: #888;
  --line: #e8e8e8;
  --bg: #fafaf7;
  --surface: #ffffff;
  --accent: #16a34a;
  --accent-soft: #f0fdf4;
  --correct: #1f7a4c;
  --wrong: #b33636;
}
* { box-sizing: border-box; }
body {
  font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  margin: 0; padding: 0;
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  padding: 16px 24px;
  position: sticky; top: 0; z-index: 10;
}
.nav-inner {
  max-width: 1000px; margin: 0 auto;
  display: flex; gap: 28px; align-items: center; flex-wrap: wrap;
}
.nav a { text-decoration: none; color: var(--ink-2); font-weight: 500; font-size: 15px; }
.nav a.logo { font-weight: 700; color: var(--ink); font-size: 17px; letter-spacing: -0.2px; }
.nav a:hover { color: var(--ink); }

.quiz-wrap { max-width: 680px; margin: 40px auto; padding: 0 20px; }
.quiz-header { margin-bottom: 24px; }
.quiz-header .label { font-size: 13px; color: var(--accent); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.quiz-header h1 { font-size: 28px; font-weight: 700; margin: 6px 0 8px; letter-spacing: -0.5px; }
.quiz-header p { color: var(--ink-3); margin: 0; font-size: 15px; }

/* Reusing post-card pattern */
.post-card {
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--line);
  padding: 32px;
  min-height: 340px;
  position: relative;
}

.start-screen { text-align: center; padding: 20px 0; }
.start-screen .counter { font-size: 48px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
.start-screen .counter-label { font-size: 14px; color: var(--ink-3); margin-top: -4px; }

.chapter-filters {
  display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 24px 0;
}
.chip {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--line);
  background: var(--surface);
  font-size: 13px; font-weight: 500;
  color: var(--ink-2);
  cursor: pointer; transition: all 0.2s;
}
.chip:hover, .chip.active {
  border-color: var(--accent); color: var(--accent); background: var(--accent-soft);
}

.mode-actions { display: flex; gap: 12px; justify-content: center; margin-top: 24px; }
.btn-primary, .btn-secondary {
  border: none;
  padding: 14px 30px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
  font-family: inherit;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: #15803d; }
.btn-secondary { background: #f0f0ec; color: var(--ink); }
.btn-secondary:hover { background: #e0e0db; }
.btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; }

.question-screen { display: none; }
.progress-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; font-size: 13px;
}
.chapter-tag {
  background: var(--accent-soft);
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 12px;
}
.counter-inline { color: var(--ink-3); }
.counter-inline strong { color: var(--ink); font-weight: 600; }

.bookmark-btn {
  background: none; border: none; cursor: pointer; padding: 4px;
  display: inline-flex; align-items: center; justify-content: center;
  color: var(--line); transition: color 0.2s;
}
.bookmark-btn.saved { color: #f5a623; }
.bookmark-btn svg { width: 22px; height: 22px; fill: currentColor; }

.q-text {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.55;
  margin-bottom: 24px;
  color: var(--ink);
  letter-spacing: -0.2px;
}

.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 18px;
  text-align: left;
  font-size: 15px;
  font-family: inherit;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  line-height: 1.45;
  position: relative;
}
.option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
.option-btn:disabled { cursor: default; }
.option-btn .num {
  display: inline-flex; align-items: center; justify-content: center;
  width: 24px; height: 24px; border-radius: 50%;
  background: #f0f0ec; color: var(--ink-2);
  font-size: 13px; font-weight: 600; flex-shrink: 0;
}
.option-btn.correct { border-color: var(--correct); background: #eaf6ef; color: var(--correct); }
.option-btn.correct .num { background: var(--correct); color: white; }
.option-btn.wrong { border-color: var(--wrong); background: #fcedec; color: var(--wrong); }
.option-btn.wrong .num { background: var(--wrong); color: white; }

.keyboard-hint {
  font-size: 12px; color: var(--ink-3); text-align: center; margin-top: 16px;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.key {
  background: #eee; border-radius: 4px; padding: 2px 6px; font-weight: bold; border-bottom: 2px solid #ccc;
}

.result-box {
  margin-top: 24px; padding: 20px; border-radius: 8px; background: #f7f7f4; border-left: 3px solid var(--ink-3); display: none;
}
.result-box.show { display: block; }
.result-box.correct { background: var(--accent-soft); border-left-color: var(--correct); }
.result-box.wrong { background: #fcedec; border-left-color: var(--wrong); }
.result-box .label { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 8px; }
.result-box.correct .label { color: var(--correct); }
.result-box.wrong .label { color: var(--wrong); }
.result-box .explanation { font-size: 15px; line-height: 1.65; color: var(--ink); }

.action-row { display: flex; justify-content: flex-end; margin-top: 24px; gap: 10px; }
.btn-next {
  background: var(--ink); color: white; border: none; padding: 12px 24px;
  font-size: 15px; font-weight: 600; border-radius: 8px; cursor: pointer; display: none;
}
.btn-next.show { display: inline-block; }
.btn-next:hover { background: #000; }

.score-summary {
  display: flex; gap: 24px; justify-content: center; padding: 16px 0;
  margin-top: 24px; border-top: 1px solid var(--line); font-size: 14px;
}
.score-summary .stat { text-align: center; }
.score-summary .stat .n { font-size: 22px; font-weight: 700; display: block; }
.score-summary .stat .l { color: var(--ink-3); font-size: 12px; margin-top: 2px; }

.footer { background: #2a2a2a; color: #999; padding: 40px 20px; margin-top: 60px; text-align: center; font-size: 14px; }
.footer a { color: #ccc; text-decoration: none; margin: 0 10px; }

@media (max-width: 600px) {
  .quiz-wrap { padding: 0 16px; margin: 24px auto; }
  .post-card { padding: 22px; }
  .quiz-header h1 { font-size: 22px; }
  .q-text { font-size: 16px; }
}

<script>
(function() {
  // Elements
  const els = {
    startScreen: document.getElementById('start-screen'),
    questionScreen: document.getElementById('question-screen'),
    chapterFilters: document.getElementById('chapter-filters'),
    btnStart: document.getElementById('start-quiz'),
    btnBookmarks: document.getElementById('start-bookmarks'),
    bmCount: document.getElementById('bm-count'),
    qText: document.getElementById('question-text'),
    options: document.getElementById('options'),
    resultBox: document.getElementById('result-box'),
    resultLabel: document.getElementById('result-label'),
    explanation: document.getElementById('explanation-text'),
    nextBtn: document.getElementById('next-question'),
    chapterTag: document.getElementById('chapter-tag'),
    bookmarkBtn: document.getElementById('bookmark-btn'),
    qNum: document.getElementById('question-number'),
    solved: document.getElementById('stat-solved'),
    correct: document.getElementById('stat-correct'),
    rate: document.getElementById('stat-rate'),
    summary: document.getElementById('score-summary')
  };

  // State
  let pool = [];
  let bookmarks = new Set(JSON.parse(localStorage.getItem('quiz_bookmarks') || '[]'));
  let selectedChapters = new Set();
  let currentMode = 'all'; // 'all' or 'bookmarks'
  
  let currentQuestion = null;
  let currentQuestionOriginalIndex = null;
  let solvedCount = 0;
  let correctCount = 0;
  let questionNumber = 0;
  let isAnswered = false;

  // Init UI
  function init() {
    try {
      if (typeof quizData === 'undefined' || !Array.isArray(quizData) || quizData.length === 0) {
        els.chapterFilters.innerHTML = '<div style="color:var(--wrong); font-size:14px; font-weight:600;">퀴즈 데이터를 불러오지 못했습니다. 새로고침을 해주세요.</div>';
        return;
      }

      const chapters = [...new Set(quizData.map(q => q.category).filter(Boolean))].sort();
      
      // Render Chips
      let chipsHtml = `<button class="chip active" data-ch="all">전체</button>`;
      chipsHtml += chapters.map(ch => `<button class="chip" data-ch="${ch}">${ch}</button>`).join('');
      els.chapterFilters.innerHTML = chipsHtml;

      els.chapterFilters.addEventListener('click', (e) => {
        if (e.target.classList.contains('chip')) {
          const ch = e.target.dataset.ch;
          const btnAll = els.chapterFilters.querySelector('[data-ch="all"]');
          
          if (ch === 'all') {
            selectedChapters.clear();
            els.chapterFilters.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            e.target.classList.add('active');
          } else {
            if (btnAll) btnAll.classList.remove('active');
            
            if (selectedChapters.has(ch)) {
              selectedChapters.delete(ch);
              e.target.classList.remove('active');
              if (selectedChapters.size === 0 && btnAll) btnAll.classList.add('active');
            } else {
              selectedChapters.add(ch);
              e.target.classList.add('active');
            }
          }
        }
      });

      updateBookmarkUI();

      els.btnStart.addEventListener('click', () => startQuiz('all'));
      els.btnBookmarks.addEventListener('click', () => startQuiz('bookmarks'));
      els.nextBtn.addEventListener('click', showNextQuestion);
      els.bookmarkBtn.addEventListener('click', toggleBookmark);

      // Keyboard support
      document.addEventListener('keydown', handleKeydown);
    } catch (e) {
      console.error('Quiz init error:', e);
      els.chapterFilters.innerHTML = '<div style="color:var(--wrong); font-size:14px; font-weight:600;">초기화 중 오류가 발생했습니다.</div>';
    }
  }

  function updateBookmarkUI() {
    els.bmCount.textContent = bookmarks.size;
    els.btnBookmarks.disabled = bookmarks.size === 0;
  }

  function startQuiz(mode) {
    try {
      if (typeof quizData === 'undefined') {
        alert('퀴즈 데이터가 로드되지 않았습니다.');
        return;
      }
      currentMode = mode;
      els.startScreen.style.display = 'none';
      els.questionScreen.style.display = 'block';
      els.summary.style.display = 'flex';
      
      buildPool();
      showNextQuestion();
    } catch (e) {
      console.error('startQuiz error:', e);
      alert('퀴즈 시작 중 오류가 발생했습니다.');
    }
  }

  function buildPool() {
    pool = [];
    quizData.forEach((q, idx) => {
      if (currentMode === 'bookmarks') {
        if (bookmarks.has(idx)) pool.push(idx);
      } else {
        if (selectedChapters.size === 0 || selectedChapters.has(q.category)) {
          pool.push(idx);
        }
      }
    });
    
    // Shuffle pool
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
  }

  function showNextQuestion() {
    if (pool.length === 0) {
      alert(currentMode === 'bookmarks' ? '모든 오답노트 문제를 풀었습니다!' : '선택한 챕터의 문제를 모두 풀었습니다!');
      location.reload();
      return;
    }

    isAnswered = false;
    currentQuestionOriginalIndex = pool.pop();
    currentQuestion = quizData[currentQuestionOriginalIndex];
    questionNumber++;

    els.resultBox.classList.remove('show', 'correct', 'wrong');
    els.nextBtn.classList.remove('show');
    els.qNum.textContent = questionNumber;
    els.chapterTag.textContent = currentQuestion.category || '기출문제';
    els.qText.textContent = currentQuestion.question;

    // Set bookmark btn state
    if (bookmarks.has(currentQuestionOriginalIndex)) {
      els.bookmarkBtn.classList.add('saved');
    } else {
      els.bookmarkBtn.classList.remove('saved');
    }

    // Shuffle options
    const displayOrder = [0, 1, 2, 3];
    for (let i = 3; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [displayOrder[i], displayOrder[j]] = [displayOrder[j], displayOrder[i]];
    }
    currentQuestion._displayOrder = displayOrder;

    els.options.innerHTML = '';
    displayOrder.forEach((optIdx, displayIdx) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="num">${displayIdx + 1}</span><span>${currentQuestion.options[optIdx]}</span>`;
      btn.onclick = () => submitAnswer(optIdx, btn);
      els.options.appendChild(btn);
    });

    injectJSONLD();
  }

  function submitAnswer(selectedIdx, btnClicked) {
    if (isAnswered) return;
    isAnswered = true;

    const buttons = els.options.querySelectorAll('.option-btn');
    buttons.forEach(b => b.disabled = true);

    const isCorrect = selectedIdx === currentQuestion.correct;
    solvedCount++;
    if (isCorrect) correctCount++;

    buttons.forEach((b, displayIdx) => {
      const optIdx = currentQuestion._displayOrder[displayIdx];
      if (optIdx === currentQuestion.correct) b.classList.add('correct');
      else if (b === btnClicked) b.classList.add('wrong');
    });

    els.resultBox.classList.add('show');
    els.resultBox.classList.add(isCorrect ? 'correct' : 'wrong');
    els.resultLabel.textContent = isCorrect ? '정답입니다!' : '오답입니다';
    els.explanation.textContent = currentQuestion.explanation;
    els.nextBtn.classList.add('show');

    // Stats update
    els.solved.textContent = solvedCount;
    els.correct.textContent = correctCount;
    els.rate.textContent = Math.round((correctCount / solvedCount) * 100) + '%';
    
    // Auto-save to bookmark if wrong
    if (!isCorrect && !bookmarks.has(currentQuestionOriginalIndex)) {
      toggleBookmark();
    }
  }

  function toggleBookmark() {
    if (currentQuestionOriginalIndex === null) return;
    
    if (bookmarks.has(currentQuestionOriginalIndex)) {
      bookmarks.delete(currentQuestionOriginalIndex);
      els.bookmarkBtn.classList.remove('saved');
    } else {
      bookmarks.add(currentQuestionOriginalIndex);
      els.bookmarkBtn.classList.add('saved');
    }
    
    localStorage.setItem('quiz_bookmarks', JSON.stringify(Array.from(bookmarks)));
    updateBookmarkUI();
  }

  function handleKeydown(e) {
    try {
      // If not actively showing a question, do nothing
      if (els.startScreen.style.display !== 'none' || els.questionScreen.style.display === 'none') return;

      if (e.key >= '1' && e.key <= '4') {
        if (isAnswered) return;
        const displayIdx = parseInt(e.key) - 1;
        if (!currentQuestion || !currentQuestion._displayOrder) return;
        const optIdx = currentQuestion._displayOrder[displayIdx];
        const buttons = els.options.querySelectorAll('.option-btn');
        if (buttons[displayIdx]) submitAnswer(optIdx, buttons[displayIdx]);
      } else if (e.key === 'Enter') {
        if (isAnswered && els.nextBtn.classList.contains('show')) {
          showNextQuestion();
        }
      }
    } catch (err) {
      console.error('Keyboard handle error:', err);
    }
  }

  function injectJSONLD() {
    if (!currentQuestion) return;
    
    const schema = {
      "@context": "https://schema.org",
      "@type": "Quiz",
      "name": "요양보호사 기출문제 " + questionNumber,
      "about": {
        "@type": "Thing",
        "name": "요양보호사 자격시험"
      },
      "educationalAlignment": [
        {
          "@type": "AlignmentObject",
          "alignmentType": "educationalSubject",
          "targetName": currentQuestion.category || "기출문제"
        }
      ],
      "hasPart": [
        {
          "@type": "Question",
          "name": currentQuestion.question,
          "text": currentQuestion.question,
          "acceptedAnswer": {
            "@type": "Answer",
            "text": currentQuestion.options[currentQuestion.correct],
            "answerExplanation": {
              "@type": "Comment",
              "text": currentQuestion.explanation
            }
          },
          "suggestedAnswer": currentQuestion.options.map((opt, i) => {
             if(i === currentQuestion.correct) return null;
             return {
               "@type": "Answer",
               "text": opt
             }
          }).filter(Boolean)
        }
      ]
    };

    const script = document.getElementById('json-ld-placeholder');
    if (script) script.textContent = JSON.stringify(schema);
  }

  init();
})();
</script>

</body>
</html>
