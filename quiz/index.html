<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>요양보호사 기출문제 | 무료 랜덤 풀이</title>
<meta name="description" content="요양보호사 국가시험 기출문제 무료 랜덤 풀이. Chapter 1~7 전범위 588문제. 정답과 해설 제공.">
<link rel="canonical" href="https://www.yositong.com/quiz/">
<meta property="og:title" content="요양보호사 기출문제 | 무료 랜덤 풀이">
<meta property="og:description" content="Chapter 1~7 전범위 588문제 무료 풀이">
<meta property="og:url" content="https://www.yositong.com/quiz/">
<style>
:root {
  --ink: #1a1a1a;
  --ink-2: #4a4a4a;
  --ink-3: #888;
  --line: #e8e8e8;
  --bg: #fafaf7;
  --surface: #ffffff;
  --accent: #2a5c3f;
  --accent-soft: #edf4ef;
  --correct: #1f7a4c;
  --wrong: #b33636;
}
* { box-sizing: border-box; }
body {
  font-family: 'Pretendard', -apple-system, 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  margin: 0; padding: 0;
  color: var(--ink);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.nav {
  background: var(--surface);
  border-bottom: 1px solid var(--line);
  padding: 16px 24px;
  position: sticky; top: 0; z-index: 10;
}
.nav-inner {
  max-width: 1000px; margin: 0 auto;
  display: flex; gap: 28px; align-items: center; flex-wrap: wrap;
}
.nav a { text-decoration: none; color: var(--ink-2); font-weight: 500; font-size: 15px; }
.nav a.logo { font-weight: 700; color: var(--ink); font-size: 17px; letter-spacing: -0.2px; }
.nav a:hover { color: var(--ink); }

.quiz-wrap { max-width: 680px; margin: 40px auto; padding: 0 20px; }
.quiz-header { margin-bottom: 24px; }
.quiz-header .label { font-size: 13px; color: var(--accent); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; }
.quiz-header h1 { font-size: 28px; font-weight: 700; margin: 6px 0 8px; letter-spacing: -0.5px; }
.quiz-header p { color: var(--ink-3); margin: 0; font-size: 15px; }

.quiz-card {
  background: var(--surface);
  border-radius: 12px;
  border: 1px solid var(--line);
  padding: 32px;
  min-height: 340px;
}

.start-screen { text-align: center; padding: 40px 20px; }
.start-screen .counter { font-size: 48px; font-weight: 700; color: var(--accent); letter-spacing: -1px; }
.start-screen .counter-label { font-size: 14px; color: var(--ink-3); margin-top: -4px; }
.start-screen p { margin: 20px 0 32px; color: var(--ink-2); font-size: 15px; }
.btn-primary {
  background: var(--accent);
  color: white;
  border: none;
  padding: 14px 36px;
  font-size: 16px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  transition: background 0.15s;
  font-family: inherit;
}
.btn-primary:hover { background: #204a32; }

.question-screen { display: none; }
.progress-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; font-size: 13px;
}
.chapter-tag {
  background: var(--accent-soft);
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 12px;
  font-weight: 600;
  font-size: 12px;
}
.counter-inline { color: var(--ink-3); }
.counter-inline strong { color: var(--ink); font-weight: 600; }

.q-text {
  font-size: 18px;
  font-weight: 600;
  line-height: 1.55;
  margin-bottom: 24px;
  color: var(--ink);
  letter-spacing: -0.2px;
}

.options { display: flex; flex-direction: column; gap: 10px; }
.option-btn {
  background: var(--surface);
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 14px 18px;
  text-align: left;
  font-size: 15px;
  font-family: inherit;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  line-height: 1.45;
}
.option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-soft); }
.option-btn:disabled { cursor: default; }
.option-btn .num {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: #f0f0ec;
  color: var(--ink-2);
  font-size: 13px;
  font-weight: 600;
  flex-shrink: 0;
}
.option-btn.correct { border-color: var(--correct); background: #eaf6ef; color: var(--correct); }
.option-btn.correct .num { background: var(--correct); color: white; }
.option-btn.wrong { border-color: var(--wrong); background: #fcedec; color: var(--wrong); }
.option-btn.wrong .num { background: var(--wrong); color: white; }

.result-box {
  margin-top: 24px;
  padding: 20px;
  border-radius: 8px;
  background: #f7f7f4;
  border-left: 3px solid var(--ink-3);
  display: none;
}
.result-box.show { display: block; }
.result-box.correct { background: var(--accent-soft); border-left-color: var(--correct); }
.result-box.wrong { background: #fcedec; border-left-color: var(--wrong); }
.result-box .label {
  font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
  color: var(--ink-3);
  margin-bottom: 8px;
}
.result-box.correct .label { color: var(--correct); }
.result-box.wrong .label { color: var(--wrong); }
.result-box .explanation {
  font-size: 15px; line-height: 1.65; color: var(--ink);
}

.action-row {
  display: flex; justify-content: flex-end;
  margin-top: 24px;
  gap: 10px;
}
.btn-next {
  background: var(--ink);
  color: white;
  border: none;
  padding: 12px 24px;
  font-size: 15px;
  font-weight: 600;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  display: none;
}
.btn-next.show { display: inline-block; }
.btn-next:hover { background: #000; }

.score-summary {
  display: flex; gap: 24px; justify-content: center;
  padding: 16px 0;
  margin-top: 24px;
  border-top: 1px solid var(--line);
  font-size: 14px;
}
.score-summary .stat { text-align: center; }
.score-summary .stat .n { font-size: 22px; font-weight: 700; display: block; }
.score-summary .stat .l { color: var(--ink-3); font-size: 12px; margin-top: 2px; }

.footer { background: #2a2a2a; color: #999; padding: 40px 20px; margin-top: 60px; text-align: center; font-size: 14px; }
.footer a { color: #ccc; text-decoration: none; margin: 0 10px; }

@media (max-width: 600px) {
  .quiz-wrap { padding: 0 16px; margin: 24px auto; }
  .quiz-card { padding: 22px; }
  .quiz-header h1 { font-size: 22px; }
  .q-text { font-size: 16px; }
}
</style>
</head>
<body>

<nav class="nav"><div class="nav-inner">
<a href="/" class="logo">요양보호사 정보</a>
<a href="/jobs/">취업정보</a>
<a href="/academy/">학원가이드</a>
<a href="/quiz/">문제풀이</a>
<a href="/blog/">정보글</a>
</div></nav>

<main class="quiz-wrap">

<header class="quiz-header">
<div class="label">기출문제 랜덤풀이</div>
<h1>요양보호사 시험 문제풀이</h1>
<p>Chapter 1부터 7까지 전범위에서 무작위로 출제됩니다.</p>
</header>

<section class="quiz-card">

<div id="start-screen" class="start-screen">
<div class="counter">588</div>
<div class="counter-label">문제 수록</div>
<p>정답과 해설이 바로 제공됩니다.<br>원하는 만큼 반복해서 풀어보세요.</p>
<button id="start-quiz" class="btn-primary">문제 시작하기</button>
</div>

<div id="question-screen" class="question-screen">
<div class="progress-row">
<span id="chapter-tag" class="chapter-tag">Chapter 1</span>
<span class="counter-inline"><strong id="question-number">1</strong>번째 문제</span>
</div>
<div id="question-text" class="q-text"></div>
<div id="options" class="options"></div>

<div id="result-box" class="result-box">
<div class="label" id="result-label">해설</div>
<div class="explanation" id="explanation-text"></div>
</div>

<div class="action-row">
<button id="next-question" class="btn-next">다음 문제 →</button>
</div>
</div>

</section>

<div id="score-summary" class="score-summary" style="display:none;">
<div class="stat"><span class="n" id="stat-solved">0</span><span class="l">푼 문제</span></div>
<div class="stat"><span class="n" id="stat-correct">0</span><span class="l">정답</span></div>
<div class="stat"><span class="n" id="stat-rate">0%</span><span class="l">정답률</span></div>
</div>

</main>

<footer class="footer">
<div>© 2026 요양보호사 정보 · yositong.com</div>
<div style="margin-top: 10px;">
<a href="/blog/">정보글</a> · <a href="/jobs/">취업정보</a> · <a href="/quiz/">문제풀이</a>
</div>
</footer>

<script src="data.js" defer></script>
<script defer>
document.addEventListener('DOMContentLoaded', function() {
  let current = null;
  let solved = 0, correct = 0;
  let qNum = 0;

  const $start = document.getElementById('start-screen');
  const $question = document.getElementById('question-screen');
  const $summary = document.getElementById('score-summary');
  const $qText = document.getElementById('question-text');
  const $options = document.getElementById('options');
  const $result = document.getElementById('result-box');
  const $explanation = document.getElementById('explanation-text');
  const $resultLabel = document.getElementById('result-label');
  const $next = document.getElementById('next-question');
  const $chapter = document.getElementById('chapter-tag');
  const $qNum = document.getElementById('question-number');
  const $solved = document.getElementById('stat-solved');
  const $correct = document.getElementById('stat-correct');
  const $rate = document.getElementById('stat-rate');

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function render() {
    $result.classList.remove('show', 'correct', 'wrong');
    $next.classList.remove('show');
    qNum++;
    $qNum.textContent = qNum;

    const idx = Math.floor(Math.random() * quizData.length);
    current = quizData[idx];
    current._displayOrder = shuffle([0, 1, 2, 3]);

    $chapter.textContent = current.category || 'Chapter';
    $qText.textContent = current.question;

    $options.innerHTML = '';
    current._displayOrder.forEach((optIdx, displayIdx) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="num">${displayIdx + 1}</span><span>${current.options[optIdx]}</span>`;
      btn.onclick = () => answer(optIdx, btn);
      $options.appendChild(btn);
    });
  }

  function answer(selectedIdx, btnClicked) {
    const buttons = $options.querySelectorAll('.option-btn');
    buttons.forEach(b => b.disabled = true);

    const isCorrect = selectedIdx === current.correct;
    solved++;
    if (isCorrect) correct++;

    buttons.forEach((b, displayIdx) => {
      const optIdx = current._displayOrder[displayIdx];
      if (optIdx === current.correct) b.classList.add('correct');
      else if (b === btnClicked) b.classList.add('wrong');
    });

    $result.classList.add('show');
    $result.classList.add(isCorrect ? 'correct' : 'wrong');
    $resultLabel.textContent = isCorrect ? '정답입니다' : '오답입니다';
    $explanation.textContent = current.explanation;
    $next.classList.add('show');

    $solved.textContent = solved;
    $correct.textContent = correct;
    $rate.textContent = Math.round(correct / solved * 100) + '%';
    $summary.style.display = 'flex';
  }

  document.getElementById('start-quiz').onclick = () => {
    $start.style.display = 'none';
    $question.style.display = 'block';
    render();
  };
  $next.onclick = render;
});
</script>

</body>
</html>
