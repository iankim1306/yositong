<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시설 상세정보 - yositong</title>
<meta name="description" content="장기요양기관 상세 정보를 확인하세요.">
<link rel="stylesheet" href="/jobs/jobs.css">
<style>
.detail-hero { background: linear-gradient(180deg, var(--bg) 0%, var(--accent-soft) 100%); padding: 48px 24px 32px; border-bottom: 1px solid var(--line); }
.detail-inner { max-width: 800px; margin: 0 auto; }
.detail-hero h1 { font-size: 28px; font-weight: 700; margin: 0 0 8px; letter-spacing: -0.5px; }
.detail-hero .subtitle { font-size: 16px; color: var(--ink-2); margin: 0; }
.detail-main { max-width: 800px; margin: 0 auto; padding: 40px 24px; }
.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 32px; }
.info-card { padding: 20px; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; }
.info-card .label { font-size: 13px; color: var(--ink-3); font-weight: 600; margin-bottom: 4px; }
.info-card .value { font-size: 17px; font-weight: 600; color: var(--ink); }
.info-card .value a { color: var(--accent); text-decoration: underline; }
.type-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.type-tag { padding: 6px 14px; border-radius: 6px; font-size: 14px; font-weight: 600; }
.type-tag.care { background: #e6f4ea; color: #1e8e3e; }
.type-tag.home { background: #e8f0fe; color: #1a73e8; }
.type-tag.day { background: #fef7e0; color: #f29900; }
.type-tag.other { background: #f1f3f4; color: #5f6368; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 15px; color: var(--ink-2); margin-bottom: 24px; }
.back-link:hover { color: var(--accent); }
.loading-state { text-align: center; padding: 80px 24px; color: var(--ink-3); font-size: 18px; }
.error-state { text-align: center; padding: 80px 24px; }
.error-state h2 { font-size: 24px; margin: 0 0 8px; }
.error-state p { color: var(--ink-2); }
@media (max-width: 600px) {
  .info-grid { grid-template-columns: 1fr; }
  .detail-hero h1 { font-size: 22px; }
}
</style>
<meta property="og:image" content="https://www.yositong.com/assets/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://www.yositong.com/assets/og-image.png">
</head>
<body>

<nav class="nav"><div class="nav-inner">
<a href="/" class="logo">요양보호사 정보</a>
<a href="/jobs/">취업정보</a>
<a href="/academy/">학원가이드</a>
<a href="/quiz/">문제풀이</a>
<a href="/blog/">정보글</a>
</div></nav>

<div id="content">
  <div class="loading-state" id="loading">시설 정보를 불러오는 중...</div>
</div>

<footer class="footer">
<div class="brand">요양보호사 정보</div>
<div>© 2026 yositong.com</div>
<div style="margin-top: 12px;">
<a href="/jobs/">취업정보</a>·<a href="/academy/">학원가이드</a>·<a href="/quiz/">문제풀이</a>·<a href="/blog/">정보글</a>·<a href="/about/">소개</a>·<a href="/contact/">문의</a>·<a href="/privacy/">개인정보처리방침</a>
</div>
</footer>

<script>
(async function() {
  const pathParts = window.location.pathname.split('/').filter(Boolean);
  // URL: /facility/{code}
  const code = pathParts[pathParts.length - 1] || new URLSearchParams(window.location.search).get('code');

  if (!code) {
    showError('시설 코드가 지정되지 않았습니다.');
    return;
  }

  try {
    const res = await fetch('/api/facility/' + encodeURIComponent(code));
    if (!res.ok) throw new Error('not found');
    const data = await res.json();
    renderDetail(data.facility);
  } catch(e) {
    showError('해당 시설을 찾을 수 없습니다.');
  }

  function renderDetail(f) {
    const slugLabel = { care: '요양원', home: '방문요양', day: '주야간보호', other: '기타' }[f.primarySlug] || '기타';
    const dateStr = f.designatedDate ? f.designatedDate.slice(0,4)+'.'+f.designatedDate.slice(4,6)+'.'+f.designatedDate.slice(6,8) : '-';
    const regDateStr = f.registeredDate ? f.registeredDate.slice(0,4)+'.'+f.registeredDate.slice(4,6)+'.'+f.registeredDate.slice(6,8) : '-';
    const regionSlug = f.sido + '-' + f.sigungu;

    document.title = f.name + ' - ' + f.sido + ' ' + f.sigungu + ' 요양시설 | yositong';
    document.querySelector('meta[name="description"]').content = f.name + ' 상세 정보. ' + f.address + '. ' + (f.typeNames || []).join(', ');

    const typeHtml = (f.typeNames || []).map(t =>
      '<span class="type-tag ' + f.primarySlug + '">' + esc(t) + '</span>'
    ).join('');

    document.getElementById('content').innerHTML = `
      <section class="detail-hero">
        <div class="detail-inner">
          <a href="/jobs/?region=${encodeURIComponent(f.sido)}&sigungu=${encodeURIComponent(f.sigungu)}" class="back-link">
            <img src="/jobs/assets/icons/pin.svg" alt="" style="width:16px;height:16px;opacity:0.5;">
            ${esc(f.sido)} ${esc(f.sigungu)} 시설 목록으로
          </a>
          <h1>${esc(f.name)}</h1>
          <p class="subtitle">${esc(f.sido)} ${esc(f.sigungu)} · ${slugLabel} · 기관코드 ${esc(f.code)}</p>
        </div>
      </section>
      <main class="detail-main">
        <div class="info-grid">
          <div class="info-card">
            <div class="label">주소</div>
            <div class="value"><a href="https://map.naver.com/v5/search/${encodeURIComponent(f.address)}" target="_blank">${esc(f.address)}</a></div>
          </div>
          <div class="info-card">
            <div class="label">우편번호</div>
            <div class="value">${esc(f.zipcode)}</div>
          </div>
          <div class="info-card">
            <div class="label">지정일자</div>
            <div class="value">${dateStr}</div>
          </div>
          <div class="info-card">
            <div class="label">설치신고일자</div>
            <div class="value">${regDateStr}</div>
          </div>
        </div>
        <div class="info-card" style="margin-bottom:32px;">
          <div class="label">시설 유형</div>
          <div class="type-tags" style="margin-top:8px;">${typeHtml}</div>
        </div>
        <a href="/jobs/?region=${encodeURIComponent(f.sido)}&sigungu=${encodeURIComponent(f.sigungu)}" class="btn btn-primary" style="width:100%;">
          <img src="/jobs/assets/icons/briefcase.svg" alt="" class="btn-icon"> ${esc(f.sido)} ${esc(f.sigungu)} 채용공고 보기
        </a>
      </main>
    `;
  }

  function showError(msg) {
    document.getElementById('content').innerHTML = '<div class="error-state"><h2>시설을 찾을 수 없습니다</h2><p>' + esc(msg) + '</p><a href="/jobs/" class="btn btn-primary" style="margin-top:24px;">취업정보 보기</a></div>';
  }

  function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
})();
</script>
</body>
</html>
